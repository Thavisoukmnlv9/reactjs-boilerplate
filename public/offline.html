<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Boilerplate Storefront</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }
      main {
        width: min(480px, 92vw);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #d1d5db;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Boilerplate Storefront will reconnect automatically when your network returns.</p>
    </main>
  </body>
</html>
